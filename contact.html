<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navbar -->
    <header class="bg-primary text-white text-center py-3">
        <nav class="container">
            <ul class="nav justify-content-center">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="projects.html">Projects</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="certificates.html">Certificates</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="container py-5">
        <h2 class="mb-4">Contact Me</h2>

        <form action="https://formsubmit.co/rajeshnalubola@gmail.com" method="POST">

            <!-- Disable captcha -->
            <input type="hidden" name="_captcha" value="false">

            <!-- Redirect after submit -->
            <input type="hidden" name="_next" value="thankyou.html">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="4" placeholder="Enter your message" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Send Message</button>
            <div id="success-msg" class="alert alert-success mt-3" style="display:none;">
    ✅ Mail sent successfully!
</div>

        </form>
    </section>
<script>
const form = document.getElementById("contact-form");

form.addEventListener("submit", function(e) {
    e.preventDefault(); // stop default POST redirect

    const formData = new FormData(form);

    fetch("https://formsubmit.co/YOUR-EMAIL@gmail.com", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if (response.ok) {
            document.getElementById("success-msg").style.display = "block";
            form.reset();
        } else {
            alert("Something went wrong!");
        }
    })
    .catch(() => alert("Error sending message"));
});
</script>
</body>
</html>
